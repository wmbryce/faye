name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test + build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: faye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/faye_test
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/faye_test
      AUTH_TOKEN_SECRET: ci-test-secret-must-be-at-least-32-chars
      OPERATOR_EMAIL: ci@example.com
      RESEND_API_KEY: re_ci_dummy
      RESEND_FROM: Faye <ci@example.com>
      APP_URL: http://localhost:3000
      FB_WEBHOOK_VERIFY_TOKEN: ci_dummy_verify
      FB_WEBHOOK_APP_SECRET: ci_dummy_secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build
