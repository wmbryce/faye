name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: build + push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: ssh + restart
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: deploy via ssh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: faye
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/faye

            # Pull the freshly-built image
            export FAYE_IMAGE_TAG=${{ needs.build-and-push.outputs.tag }}
            docker compose pull web

            # Run migrations against the live DB BEFORE flipping traffic.
            # Migrations are forward-only and additive; this is safe.
            docker compose run --rm web pnpm db:migrate

            # Recreate the web container with the new image; postgres + caddy untouched.
            docker compose up -d --no-deps --force-recreate web

            # Prune untagged image layers to keep disk usage bounded.
            docker image prune -f

            # Health check — fail the deploy if /api/health doesn't respond within 30s.
            for i in $(seq 1 30); do
              if curl -fsS http://localhost/api/health >/dev/null; then
                echo "healthy after ${i}s"
                exit 0
              fi
              sleep 1
            done
            echo "health check failed" >&2
            docker compose logs --tail=100 web >&2
            exit 1
